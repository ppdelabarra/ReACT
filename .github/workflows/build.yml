name: ESP32 Auto Build + Versioning

on:
  push:
    paths:
      - '**.ino'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # optional (future-proof)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install ESP32 core
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install libraries
        run: |
          arduino-cli lib update-index
          arduino-cli lib install "Adafruit BusIO"
          arduino-cli lib install "Adafruit ADS1X15"
          arduino-cli lib install "WiFiManager"
          arduino-cli lib install "PubSubClient"
          arduino-cli lib install "ArduinoJson"

      - name: Debug file structure (temporary)
        run: |
          echo "=== FILE STRUCTURE ==="
          ls -R

      - name: Compile firmware
        run: |
          arduino-cli compile \
          --fqbn esp32:esp32:esp32 \
          --output-dir build \
          src/sensor-reading

      - name: Prepare firmware
        run: |
          mkdir -p firmware
          cp build/*.bin firmware/ || echo "No .bin file found"

      # ----------------------------
      # VERSION SYSTEM
      # ----------------------------
      - name: Read and bump version
        run: |
          VERSION=$(jq -r '.version' version.json)
          echo "Current version: $VERSION"

          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)

          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="$MAJOR.$NEW_MINOR"

          echo "New version: $NEW_VERSION"

          jq --arg v "$NEW_VERSION" '.version = $v' version.json > tmp.json
          mv tmp.json version.json

      - name: Update firmware path in JSON
        run: |
          jq '.bin = "https://raw.githubusercontent.com/ppdelabarra/ReACT/main/firmware/sensor-reading.ino.bin"' \
          version.json > tmp.json
          mv tmp.json version.json

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add firmware version.json
          git commit -m "Auto build + version bump" || echo "No changes to commit"
          git push
