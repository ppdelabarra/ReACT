name: ESP32 Auto Build + Versioning

on:
  push:
    paths:
      - '**.ino'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install ESP32 core
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install libraries
        run: |
          arduino-cli lib install "WiFiManager"
          arduino-cli lib install "PubSubClient"
          arduino-cli lib install "ArduinoJson"

      - name: Compile firmware
        run: |
          arduino-cli compile \
          --fqbn esp32:esp32:esp32 \
          --output-dir build \
          src/sensor-reading.ino

      - name: Prepare firmware
        run: |
          mkdir -p firmware
          cp build/*.bin firmware/sensor-reading.ino.bin

      # ----------------------------
      # VERSION SYSTEM (IMPORTANT)
      # ----------------------------
      - name: Read and bump version
        run: |
          VERSION=$(jq -r '.version' version.json)
          echo "Current version: $VERSION"

          # split major.minor
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)

          # increment minor
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="$MAJOR.$NEW_MINOR"

          echo "New version: $NEW_VERSION"

          jq --arg v "$NEW_VERSION" '.version = $v' version.json > tmp.json
          mv tmp.json version.json

      - name: Update firmware path in JSON
        run: |
          jq '.bin = "https://raw.githubusercontent.com/ppdelabarra/ReACT/main/firmware/sensor-reading.ino.bin"' \
          version.json > tmp.json
          mv tmp.json version.json

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add firmware/sensor-reading.ino.bin version.json

          git commit -m "Auto build + version bump"
          git push
